<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>소파 밑 탐험대</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #app {
      width: 360px;
      height: 680px;
      position: relative;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    /* 스캔라인 오버레이 */
    #app::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── 공통 스크린 ── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
    }

    /* ── 메인 화면 ── */
    #screen-main {
      background: #1a0e2e;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #star-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .main-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .game-title {
      color: #f5c842;
      font-size: 13px;
      text-align: center;
      line-height: 2;
      text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
      margin-bottom: 28px;
    }

    #sofa-canvas {
      display: block;
      image-rendering: pixelated;
      margin-bottom: 36px;
    }

    .btn {
      display: block;
      padding: 14px 8px;
      background: #f5c842;
      color: #1a0e2e;
      border: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      text-align: center;
      cursor: pointer;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.05s, box-shadow 0.05s;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000;
    }

    #btn-start { width: 220px; margin-bottom: 12px; }

    .btn-row { display: flex; gap: 12px; }

    .btn-sm {
      padding: 11px 8px;
      font-size: 9px;
      width: 100px;
      background: #2a1a4e;
      color: #c8b8e8;
      border: none;
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.05s, box-shadow 0.05s;
      user-select: none;
    }
    .btn-sm:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000;
    }

    /* ── 게임 화면 ── */
    #screen-game { background: #000; }

    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── 도감 / 기록 공통 ── */
    #screen-collection,
    #screen-records {
      background: #1a0e2e;
      color: #c8b8e8;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
    }

    .screen-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .screen-title {
      font-size: 10px;
      color: #f5c842;
      text-shadow: 2px 2px 0 #000;
    }

    .btn-back {
      background: #2a1a4e;
      color: #c8b8e8;
      border: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px 10px;
      cursor: pointer;
      box-shadow: 3px 3px 0 #000;
    }
    .btn-back:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #000;
    }

    /* ── 도감 그리드 ── */
    .col-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .c-item {
      aspect-ratio: 1;
      background: #2a1a4e;
      border: 2px solid #3d2060;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      position: relative;
    }
    .c-item.locked { filter: brightness(0.15); }

    .c-rarity {
      position: absolute;
      bottom: 3px; right: 3px;
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .r-common { background: #888; }
    .r-rare   { background: #44aaff; }
    .r-epic   { background: #e05c2a; }

    /* ── 기록 ── */
    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-box {
      flex: 1;
      background: #2a1a4e;
      padding: 12px 8px;
      text-align: center;
    }
    .stat-num {
      display: block;
      font-size: 22px;
      color: #f5c842;
      margin-bottom: 6px;
    }
    .stat-label { font-size: 7px; }

    .record-row {
      background: #2a1a4e;
      border-left: 3px solid #f5c842;
      padding: 10px 12px;
      font-size: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .record-row.fail { border-left-color: #e05c2a; }
    .record-date { color: #555; }

    /* ── 햄스터 게임오버 모달 ── */
    #hamster-modal {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #hamster-modal.visible { display: flex; }

    .hm-box {
      background: #1a0e2e;
      border: 2px solid #e05c2a;
      box-shadow: 6px 6px 0 #000;
      width: 280px;
      padding: 28px 20px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .hm-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: #e05c2a;
      text-align: center;
      line-height: 1.7;
    }
    .hm-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #c8b8e8;
      text-align: center;
      line-height: 1.8;
    }
    .hm-btns {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      margin-top: 4px;
    }
    .hm-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 11px 8px;
      border: none;
      cursor: pointer;
      box-shadow: 3px 3px 0 #000;
      text-align: center;
      user-select: none;
    }
    .hm-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #000; }
    .hm-btn-home   { background: #f5c842; color: #1a0e2e; }
    .hm-btn-col    { background: #2a1a4e; color: #c8b8e8; }
    .hm-btn-retry  { background: #3dba4e; color: #1a0e2e; }
  </style>
</head>
<body>

<div id="app">

  <!-- ① 메인 화면 -->
  <div id="screen-main" class="screen" style="display:flex">
    <canvas id="star-canvas"></canvas>
    <div class="main-content">
      <div class="game-title">소파 밑<br>탐험대</div>
      <canvas id="sofa-canvas" width="200" height="122"></canvas>
      <button class="btn" id="btn-start">▶  탐험 시작</button>
      <div class="btn-row">
        <button class="btn-sm" id="btn-collection">📦 도감</button>
        <button class="btn-sm" id="btn-records">📋 기록</button>
      </div>
    </div>
  </div>

  <!-- ② 게임 화면 -->
  <div id="screen-game" class="screen">
    <canvas id="game-canvas" width="360" height="680"></canvas>
  </div>

  <!-- ③ 도감 화면 -->
  <div id="screen-collection" class="screen">
    <div class="screen-header">
      <button class="btn-back" id="btn-back-col">← 뒤로</button>
      <span class="screen-title">도감</span>
    </div>
    <div class="col-grid" id="col-grid"></div>
  </div>

  <!-- ④ 기록 화면 -->
  <div id="screen-records" class="screen">
    <div class="screen-header">
      <button class="btn-back" id="btn-back-rec">← 뒤로</button>
      <span class="screen-title">기록</span>
    </div>
    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-num" id="stat-plays">0</span>
        <span class="stat-label">총 판수</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="stat-wins">0</span>
        <span class="stat-label">성공</span>
      </div>
    </div>
    <div id="rec-list"></div>
  </div>

  <!-- 햄스터 게임오버 모달 -->
  <div id="hamster-modal">
    <div class="hm-box">
      <div class="hm-title">😠 잠든 햄스터를<br>건드렸어요!</div>
      <div class="hm-sub">줄자가 햄스터를 깨워버렸어요.<br>다시 조심해서 탐험해볼까요?</div>
      <div class="hm-btns">
        <button class="hm-btn hm-btn-retry"  id="hm-btn-retry" >▶  다시하기</button>
        <button class="hm-btn hm-btn-col"    id="hm-btn-col"   >📦 도감 보기</button>
        <button class="hm-btn hm-btn-home"   id="hm-btn-home"  >🏠 홈으로 가기</button>
      </div>
    </div>
  </div>

</div><!-- #app -->


<script>
'use strict';

// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
const GW = 360, GH = 680;
const WORLD_H       = 2800;
const ENTRANCE_Y    = 100;
const ITEM_Y        = WORLD_H - 250;   // 2550
const SCROLL        = 2.0;
const SCROLL_UP     = 2.3;             // × 1.15
const RW            = 5;               // 자 반너비
const PICKUP_FRAMES    = 50;
const ITEM_TRIGGER_PCT = 0.62;   // ? 박스가 도달해야 할 화면 Y 비율 (상단 기준)
const FLOOR_LIGHT_END     = 300;    // worldY < 이 값이면 floorlight 타일, 이상이면 floordark
const HAMSTER_WAKE_DELAY  = 90;     // 햄스터 충돌 → 모달 표시까지 대기 프레임 (~1.5초)

// ── 앱 상태 열거값 ──────────────────────────
const STATE = Object.freeze({
  MAIN:       'main',
  GAME:       'game',
  COLLECTION: 'collection',
  RECORDS:    'records',
});

// ── 게임 단계 열거값 ────────────────────────
const PHASE = Object.freeze({
  DESCEND: 'descend',   // 자동 하강
  PICKUP:  'pickup',    // 아이템 획득 대기
  ASCEND:  'ascend',    // 자동 상승
  DONE:    'done',      // 입구 도달, 성공 판정
});

// ── 단계별 설정 (스크롤 속도 + HUD 메타) ────
//   scroll > 0 : 아래로 이동 (cameraY 증가)
//   scroll < 0 : 위로 이동  (cameraY 감소)
//   scroll = 0 : 카메라 정지
const PHASE_CONFIG = Object.freeze({
  [PHASE.DESCEND]: { scroll: +SCROLL,    label: '▼ 내려가는 중', labelColor: '#c8b8e8' },
  [PHASE.PICKUP]:  { scroll:  0,          label: '★ 아이템 발견!', labelColor: '#f5c842' },
  [PHASE.ASCEND]:  { scroll: -SCROLL_UP,  label: '▲ 올라가는 중',  labelColor: '#3dba4e' },
  [PHASE.DONE]:    { scroll:  0,          label: '✓ 완료',          labelColor: '#3dba4e' },
});


// ═══════════════════════════════════════════
//  햄스터 배치 데이터
// ═══════════════════════════════════════════
const HAMSTER_SPR = new Image();
HAMSTER_SPR.src = 'assets/hamsters.png';

const SMALL_DUST_IMG = new Image();
SMALL_DUST_IMG.src = 'assets/smalldust.png';
const BIG_DUST_IMG = new Image();
BIG_DUST_IMG.src = 'assets/bigdust.png';

const FLOOR_DARK_IMG  = new Image();
FLOOR_DARK_IMG.src    = 'assets/floordark.png';
const FLOOR_LIGHT_IMG = new Image();
FLOOR_LIGHT_IMG.src   = 'assets/floorlight.PNG';

const RULER_IMG = new Image();
RULER_IMG.src   = 'assets/ruler.PNG';

const ANG_IMG = new Image();
ANG_IMG.src   = 'assets/ang.png';

const NORMAL_BOX_IMG = new Image();
NORMAL_BOX_IMG.src   = 'assets/normalbox.PNG';
const RARE_BOX_IMG   = new Image();
RARE_BOX_IMG.src     = 'assets/rarebox.PNG';

const SPRITE_FRAMES   = 5;
const FRAME_INTERVAL  = 1000 / 2;   // ms per sprite frame → 2fps
const SPRITE_LOOP     = [0, 1, 2, 3, 4];

const HAMSTER_SIZE  = 32;
const HAMSTER_DRAW  = HAMSTER_SIZE * 1.4;   // 표시 크기 44.8px (충돌은 별도 상수)
const HAMSTER_X_MIN = 10;
const HAMSTER_X_MAX = GW - HAMSTER_SIZE - 10;   // 318

// 짝수 인덱스 → 왼쪽, 홀수 인덱스 → 오른쪽
const HAMSTERS = [350, 680, 1020, 1380, 1720, 2050, 2350].map((worldY, i) => {
  const side  = i % 2 === 0 ? 'left' : 'right';
  const roam  = 30 + Math.random() * 90;                    // 활동 반경 30~120px
  const speed = 0.4 + Math.random() * 0.8;                  // 속도 0.4~1.2px
  // 기준점: 왼쪽 햄스터는 좌측, 오른쪽 햄스터는 우측 기준에 랜덤 오프셋
  const baseX = side === 'left'
    ? HAMSTER_X_MIN + roam + Math.random() * (GW / 2 - HAMSTER_SIZE - roam - HAMSTER_X_MIN)
    : HAMSTER_X_MAX - roam - Math.random() * (GW / 2 - HAMSTER_SIZE - roam - HAMSTER_X_MIN);
  return {
    worldY,
    side,
    baseX,
    roam,
    x:          baseX,
    vx:         side === 'left' ? speed : -speed,
    loopIndex:  0,
    frameTimer: 0,
    awake:      false,
  };
});

// ═══════════════════════════════════════════
//  먼지 장애물 배치 데이터
// ═══════════════════════════════════════════
const DUSTS = Array.from({ length: 24 }, () => ({
  worldY: ENTRANCE_Y + Math.random() * (ITEM_Y - ENTRANCE_Y),
  x:      5 + Math.random() * (GW - 10),
  r:      Math.floor(Math.random() * 5) + 8,   // 8~12 px (충돌 반지름 겸 렌더 크기 기준)
  alpha:  0.45 + Math.random() * 0.4,
  vx:     (Math.random() - 0.5) * 0.4,         // -0.2 ~ +0.2 px/frame
  vy:     (Math.random() - 0.5) * 0.4,
  phase:  Math.random() * Math.PI * 2,          // sin 위상 오프셋
  type:   Math.random() < 0.5 ? 'small' : 'big',
}));

// ═══════════════════════════════════════════
//  아이템 카탈로그 (20개)
// ═══════════════════════════════════════════
const ITEMS = [
  { id:'i01', name:'짝 잃은 양말',     emoji:'🧦', rarity:'common' },
  { id:'i02', name:'과자 부스러기',     emoji:'🍪', rarity:'common' },
  { id:'i03', name:'리모컨 배터리',     emoji:'🔋', rarity:'common' },
  { id:'i04', name:'머리카락 공',       emoji:'🧶', rarity:'common' },
  { id:'i05', name:'500원 동전',        emoji:'🪙', rarity:'common' },
  { id:'i06', name:'영수증',            emoji:'🧾', rarity:'common' },
  { id:'i07', name:'볼펜 뚜껑',         emoji:'✒️', rarity:'common' },
  { id:'i08', name:'고양이 장난감',     emoji:'🐱', rarity:'common' },
  { id:'i09', name:'단추',              emoji:'🔘', rarity:'common' },
  { id:'i10', name:'낡은 이어폰',       emoji:'🎧', rarity:'common' },
  { id:'i11', name:'만원 지폐',         emoji:'💴', rarity:'rare'   },
  { id:'i12', name:'잃어버린 반지',     emoji:'💍', rarity:'rare'   },
  { id:'i13', name:'지우개',            emoji:'🩹', rarity:'rare'   },
  { id:'i14', name:'택배 송장',         emoji:'📦', rarity:'rare'   },
  { id:'i15', name:'폴라로이드 사진',   emoji:'📷', rarity:'rare'   },
  { id:'i16', name:'레고 조각',         emoji:'🧱', rarity:'rare'   },
  { id:'i17', name:'오래된 껌',         emoji:'🍬', rarity:'rare'   },
  { id:'i18', name:'햄스터의 비밀일기', emoji:'📓', rarity:'epic'   },
  { id:'i19', name:'리모컨 본체',       emoji:'📺', rarity:'epic'   },
  { id:'i20', name:'차원의 문',         emoji:'🚪', rarity:'epic'   },
];


// ═══════════════════════════════════════════
//  세이브 데이터 (localStorage)
// ═══════════════════════════════════════════
const SAVE_KEY = 'sofa_explorer_v1';

function defaultSave() {
  return { collected: [], records: [], totalPlays: 0, wins: 0 };
}
function loadSave() {
  try { return { ...defaultSave(), ...JSON.parse(localStorage.getItem(SAVE_KEY)) }; }
  catch { return defaultSave(); }
}
function writeSave() {
  localStorage.setItem(SAVE_KEY, JSON.stringify(save));
}

let save = loadSave();


// ═══════════════════════════════════════════
//  상태 머신
// ═══════════════════════════════════════════
let appState   = STATE.MAIN;
let starAnimId = null;

function gotoState(next) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  appState = next;

  switch (next) {
    case STATE.MAIN:
      document.getElementById('screen-main').style.display = 'flex';
      startStars();
      break;

    case STATE.GAME:
      document.getElementById('screen-game').style.display = 'block';
      if (starAnimId) { cancelAnimationFrame(starAnimId); starAnimId = null; }
      startGame();
      break;

    case STATE.COLLECTION:
      document.getElementById('screen-collection').style.display = 'flex';
      renderCollection();
      break;

    case STATE.RECORDS:
      document.getElementById('screen-records').style.display = 'flex';
      renderRecords();
      break;
  }
}


// ═══════════════════════════════════════════
//  게임 상태
// ═══════════════════════════════════════════
let gs = {};

function startGame() {
  gs = {
    phase:       PHASE.DESCEND,
    cameraY:     0,
    rulerX:      GW / 2,
    hasItem:     false,
    pickedItem:  null,
    pickupTimer: 0,
    gameOver:    false,
    result:      null,   // 'win' | 'empty'
    endReason:    null,   // 'win' | 'hamster'
    itemDropped:  false,  // ASCEND 중 먼지 충돌로 아이템 드롭됨
    carryingBox:  false,  // ASCEND 중 박스를 들고 올라가는 상태
    caughtByDust:    false,  // 먼지에 박스가 걸린 상태
    caughtDust:      null,   // 걸린 먼지 객체 참조
    hamsterHitTimer: 0,      // 햄스터 충돌 후 모달까지 대기 카운터
  };
  // 햄스터 awake 상태 리셋
  HAMSTERS.forEach(h => { h.awake = false; });
  if (gameAnimId) cancelAnimationFrame(gameAnimId);
  gameLoop();
}


// ═══════════════════════════════════════════
//  게임 루프
// ═══════════════════════════════════════════
const gameCanvas = document.getElementById('game-canvas');
const ctx        = gameCanvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
let   gameAnimId = null;

function gameLoop() {
  function tick() {
    update();
    draw();
    // gameOver 여부와 무관하게 GAME 상태면 계속 돌림 (결과 화면 블링크 유지)
    if (appState === STATE.GAME) {
      gameAnimId = requestAnimationFrame(tick);
    }
  }
  gameAnimId = requestAnimationFrame(tick);
}

// ─── UPDATE ──────────────────────────────────
function update() {
  if (gs.gameOver) return;

  // 1. PHASE_CONFIG 기반 카메라 스크롤
  gs.cameraY = clampCam(gs.cameraY + PHASE_CONFIG[gs.phase].scroll);

  // 2. PICKUP 타이머 감소
  if (gs.phase === PHASE.PICKUP) gs.pickupTimer--;

  // 3. 전환 조건 확인 → 해당 페이즈 진입 처리
  const next = checkTransition();
  if (next !== null) transitionPhase(next);

  // 4. 햄스터 이동
  updateHamsters();

  // 5. 먼지 부유
  updateDusts();
}

// 전환 조건: 현재 페이즈에서 다음 페이즈를 반환, 유지 시 null
function checkTransition() {
  // 햄스터 충돌 (DESCEND / ASCEND 에서만) + 깨어남 딜레이
  if (gs.phase === PHASE.DESCEND || gs.phase === PHASE.ASCEND) {
    if (gs.hamsterHitTimer > 0) {
      gs.hamsterHitTimer--;
      return gs.hamsterHitTimer === 0 ? PHASE.DONE : null;
    }
    if (hitHamster()) {
      gs.endReason = 'hamster';
      gs.hamsterHitTimer = HAMSTER_WAKE_DELAY;
      return null;   // 딜레이 후 DONE 전환
    }
  }

  switch (gs.phase) {
    case PHASE.DESCEND:
      // ? 박스가 화면 상단에서 ITEM_TRIGGER_PCT 위치에 도달하면 PICKUP 전환
      return toScreenY(ITEM_Y) <= GH * ITEM_TRIGGER_PCT ? PHASE.PICKUP : null;

    case PHASE.PICKUP:
      // 대기 프레임 소진 시 ASCEND 전환
      return gs.pickupTimer <= 0 ? PHASE.ASCEND : null;

    case PHASE.ASCEND:
      // 먼지 충돌: 박스가 먼지에 엉켜 달라붙음 (pickedItem은 결과 화면용으로 유지)
      if (gs.hasItem && !gs.caughtByDust) {
        const caught = hitDust();
        if (caught) {
          gs.hasItem      = false;
          gs.itemDropped  = true;
          gs.carryingBox  = false;
          gs.caughtByDust = true;
          gs.caughtDust   = caught;   // 달라붙은 먼지 추적
        }
      }
      // 입구(cameraY=0) 도달 시 DONE 전환
      return gs.cameraY <= 0 ? PHASE.DONE : null;

    default:
      return null;
  }
}

// 전환 실행: 페이즈 변경 + 진입 시 사이드이펙트 처리
function transitionPhase(next) {
  gs.phase = next;

  switch (next) {
    case PHASE.PICKUP:
      gs.pickupTimer = PICKUP_FRAMES;
      gs.pickedItem  = rollItem();   // 박스 이미지 결정을 위해 PICKUP 진입 시 미리 뽑음
      break;

    case PHASE.ASCEND:
      gs.hasItem     = true;         // pickedItem은 이미 PICKUP에서 결정됨
      gs.carryingBox = true;
      break;

    case PHASE.DONE:
      gs.cameraY = 0;    // 정확히 입구 위치로 고정
      endGame(gs.endReason ?? 'win');
      break;
  }
}

// cameraY 하한 보정 (음수 방지)
function clampCam(y) { return Math.max(0, y); }

// 월드 Y → 화면 Y 변환
function toScreenY(worldY) { return worldY - gs.cameraY; }

// 줄자 끝 ↔ 햄스터 중심 원형 충돌 판정
function hitHamster() {
  const tipX = gs.rulerX;
  const tipY = GH * 0.75;
  const r    = (RW + 3) + HAMSTER_DRAW / 2;   // 자 끝 원 반지름 + 햄스터 표시 반지름
  for (const h of HAMSTERS) {
    const sy = toScreenY(h.worldY);
    if (sy < -HAMSTER_SIZE || sy > GH + HAMSTER_SIZE) continue;
    const cx = h.x + HAMSTER_SIZE / 2;
    const dx = tipX - cx, dy = tipY - sy;
    if (dx * dx + dy * dy <= r * r) {
      h.awake = true;   // 충돌한 햄스터만 깨움
      return true;
    }
  }
  return false;
}

// 줄자 끝 ↔ 먼지 원형 충돌 판정 (월드 좌표 기준)
function hitDust() {
  const tipX  = gs.rulerX;
  const tipWY = gs.cameraY + GH * 0.75;   // 화면 Y → 월드 Y
  for (const d of DUSTS) {
    const dx = tipX - d.x, dy = tipWY - d.worldY;
    const r  = (RW + 3) + d.r;
    if (dx * dx + dy * dy <= r * r) return d;   // 충돌한 먼지 객체 반환
  }
  return null;
}

// 등급 가중치로 아이템 뽑기
function rollItem() {
  const r = Math.random();
  let pool;
  if      (r < 0.65) pool = ITEMS.filter(i => i.rarity === 'common');
  else if (r < 0.90) pool = ITEMS.filter(i => i.rarity === 'rare');
  else               pool = ITEMS.filter(i => i.rarity === 'epic');
  return pool[Math.floor(Math.random() * pool.length)];
}

function endGame(result) {
  gs.gameOver = true;
  gs.result   = result;

  save.totalPlays++;
  if (result === 'win' && gs.pickedItem && !gs.itemDropped) {
    save.wins++;
    if (!save.collected.includes(gs.pickedItem.id))
      save.collected.push(gs.pickedItem.id);
    save.records.unshift({
      itemId: gs.pickedItem.id,
      date:   new Date().toLocaleDateString('ko-KR'),
    });
  } else {
    save.records.unshift({ itemId: null, date: new Date().toLocaleDateString('ko-KR') });
  }
  if (save.records.length > 8) save.records.length = 8;
  writeSave();

  if (result === 'hamster') {
    // 햄스터 충돌 실패: 전용 모달 표시 (canvas tap으로 닫히지 않음)
    document.getElementById('hamster-modal').classList.add('visible');
  } else {
    // 일반 결과(성공/빈손): canvas 탭으로 메인 복귀
    gameCanvas.addEventListener('pointerup', () => gotoState(STATE.MAIN), { once: true });
  }
}


// ─── DRAW ────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, GW, GH);
  drawBg();
  drawEntranceLight();
  drawDusts();
  drawHamsters();
  drawItemBox();
  drawRuler();
  drawHUD();
  if (gs.gameOver && gs.endReason !== 'hamster') drawResult();
}

function drawBg() {
  const camTop = gs.cameraY;
  const camBot = gs.cameraY + GH;

  // 가로를 GW에 맞추고 비율을 유지한 타일 높이 계산
  function scaledTileH(img) {
    return img.naturalWidth ? Math.round(img.naturalHeight * GW / img.naturalWidth) : 64;
  }

  // 지정 구간에 이미지를 비율 유지 타일링
  function tileBand(img, fallback, bandStart, bandEnd) {
    if (bandEnd <= camTop || bandStart >= camBot) return;
    if (!img.complete || !img.naturalWidth) {
      const sy = Math.max(0, bandStart - camTop);
      const ey = Math.min(GH, bandEnd - camTop);
      if (ey > sy) { ctx.fillStyle = fallback; ctx.fillRect(0, sy, GW, ey - sy); }
      return;
    }
    const th = scaledTileH(img);
    const firstRow = Math.floor((Math.max(camTop, bandStart) - bandStart) / th);
    for (let r = firstRow; ; r++) {
      const wy = bandStart + r * th;
      if (wy >= bandEnd || wy >= camBot) break;
      const sy = wy - camTop;
      const drawH = Math.min(th, bandEnd - wy);   // 구간 경계에서 클리핑
      ctx.drawImage(img, 0, 0, img.naturalWidth, Math.round(img.naturalHeight * drawH / th),
                    0, sy, GW, drawH);
    }
  }

  tileBand(FLOOR_LIGHT_IMG, '#2a1a4e', 0,              FLOOR_LIGHT_END);
  tileBand(FLOOR_DARK_IMG,  '#100810', FLOOR_LIGHT_END, WORLD_H);

  // 소파 입구 천장
  const entranceSY = toScreenY(0);
  if (entranceSY > -40 && entranceSY < GH) {
    ctx.fillStyle = '#2a1a4e';
    ctx.fillRect(0, entranceSY - 40, GW, 48);
    ctx.fillStyle = '#3d2060';
    ctx.fillRect(0, entranceSY + 6, GW, 4);
  }
}

function drawEntranceLight() {
  if (gs.cameraY >= 400) return;
  const alpha  = (1 - gs.cameraY / 400) * 0.28;
  const sy     = toScreenY(0);
  const grad   = ctx.createLinearGradient(GW / 2, sy, GW / 2, sy + 300);
  grad.addColorStop(0, `rgba(61,186,78,${alpha})`);
  grad.addColorStop(1, 'rgba(61,186,78,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(GW / 2 - 25, sy);
  ctx.lineTo(GW / 2 + 25, sy);
  ctx.lineTo(GW / 2 + 75, sy + 300);
  ctx.lineTo(GW / 2 - 75, sy + 300);
  ctx.closePath();
  ctx.fill();
}

let _dustLastT = 0;

function updateDusts() {
  const now   = Date.now();
  const delta = _dustLastT ? now - _dustLastT : 16;   // ms (첫 프레임은 16ms 기본값)
  _dustLastT  = now;
  const t     = now * 0.001;                          // 초 단위 (sin 기준)
  const norm  = delta / 16;                           // 60fps 기준 1.0

  for (const d of DUSTS) {
    // sin 기반 미세 흔들림 + 기본 속도
    d.x      += (d.vx + Math.sin(t * 0.8 + d.phase) * 0.15) * norm;
    d.worldY += (d.vy + Math.cos(t * 0.6 + d.phase) * 0.10) * norm;

    // 월드 경계 반사
    if (d.x < d.r)          { d.x = d.r;          d.vx *= -1; }
    if (d.x > GW - d.r)     { d.x = GW - d.r;     d.vx *= -1; }
    if (d.worldY < ENTRANCE_Y) { d.worldY = ENTRANCE_Y; d.vy *= -1; }
    if (d.worldY > ITEM_Y)     { d.worldY = ITEM_Y;     d.vy *= -1; }
  }
}

function drawDusts() {
  for (const d of DUSTS) {
    const sy = toScreenY(d.worldY);
    if (sy < -d.r || sy > GH + d.r) continue;
    const img  = d.type === 'small' ? SMALL_DUST_IMG : BIG_DUST_IMG;
    if (!img.complete || !img.naturalWidth) continue;
    const size = d.r * 2;                         // 지름 기준 렌더링
    ctx.globalAlpha = d.alpha;
    ctx.drawImage(img, Math.floor(d.x - d.r), Math.floor(sy - d.r), size, size);
    ctx.globalAlpha = 1;
  }
}

function updateHamsters() {
  const now = Date.now();
  for (const h of HAMSTERS) {
    // 1. 스프라이트 프레임 갱신
    if (now - h.frameTimer >= FRAME_INTERVAL) {
      h.frameTimer = now;
      const nextIndex = h.loopIndex + 1;
      if (nextIndex === SPRITE_LOOP.length - 1) h.vx *= -1;
      h.loopIndex = nextIndex % SPRITE_LOOP.length;
    }
    // 2. 이동 후 baseX ± roam 구간 반사
    h.x += h.vx;
    const lo = h.baseX - h.roam;
    const hi = h.baseX + h.roam;
    if (h.x < lo) { h.x = lo; h.vx = Math.abs(h.vx); }
    if (h.x > hi) { h.x = hi; h.vx = -Math.abs(h.vx); }
  }
}

function drawHamsters() {
  if (!HAMSTER_SPR.complete || !HAMSTER_SPR.naturalWidth) return;
  const frameWidth = HAMSTER_SPR.naturalWidth / SPRITE_FRAMES;
  for (const h of HAMSTERS) {
    const sy = toScreenY(h.worldY);
    if (sy < -HAMSTER_DRAW || sy > GH + HAMSTER_DRAW) continue;
    const dx   = Math.floor(h.x + (HAMSTER_SIZE - HAMSTER_DRAW) / 2);
    const flip = h.vx < 0;
    ctx.save();
    if (flip) {
      ctx.scale(-1, 1);
      ctx.translate(-(dx * 2 + HAMSTER_DRAW), 0);
    }
    if (h.awake && ANG_IMG.complete && ANG_IMG.naturalWidth) {
      // 잠에서 깬 햄스터: ang.png 표시 (동일 크기/위치)
      ctx.drawImage(ANG_IMG, dx, sy - HAMSTER_DRAW / 2, HAMSTER_DRAW, HAMSTER_DRAW);
    } else {
      const sx = SPRITE_LOOP[h.loopIndex] * frameWidth;
      ctx.drawImage(
        HAMSTER_SPR,
        sx, 0, frameWidth, HAMSTER_SPR.naturalHeight,
        dx, sy - HAMSTER_DRAW / 2, HAMSTER_DRAW, HAMSTER_DRAW
      );
    }
    ctx.restore();
  }
}

function drawItemBox() {
  const BOX_H = 32;

  function drawBox(cx, cy) {
    const isRare = gs.pickedItem && gs.pickedItem.rarity !== 'common';
    const img    = isRare ? RARE_BOX_IMG : NORMAL_BOX_IMG;
    const BOX_W  = (img.complete && img.naturalWidth)
      ? img.naturalWidth * BOX_H / img.naturalHeight
      : BOX_H;
    if (img.complete && img.naturalWidth) {
      ctx.drawImage(img, cx - BOX_W / 2, cy - BOX_H / 2, BOX_W, BOX_H);
    } else {
      ctx.fillStyle = isRare ? '#f5c842' : '#c8b8e8';
      ctx.fillRect(cx - BOX_W / 2, cy - BOX_H / 2, BOX_W, BOX_H);
    }
  }

  if (gs.phase === PHASE.DESCEND || gs.phase === PHASE.PICKUP) {
    // 월드 좌표 → 화면 좌표로 박스 위치 계산
    const sy = toScreenY(ITEM_Y);
    if (sy < -BOX_H || sy > GH + BOX_H) return;
    // PICKUP 깜빡임 (180ms 토글) — 내용 공개 없음
    if (gs.phase === PHASE.PICKUP && Math.floor(Date.now() / 180) % 2 === 0) return;
    drawBox(GW / 2, sy);

  } else if (gs.caughtByDust && gs.caughtDust) {
    // 먼지에 달라붙은 박스: 먼지의 현재 월드 좌표를 따라 부유
    const sy = toScreenY(gs.caughtDust.worldY);
    if (sy >= -BOX_H && sy <= GH + BOX_H) {
      drawBox(gs.caughtDust.x, sy);
    }

  } else if (gs.carryingBox && (gs.phase === PHASE.ASCEND || gs.phase === PHASE.DONE)) {
    const tipX   = gs.rulerX;
    const tipY   = Math.floor(GH * 0.75);
    const t      = Date.now() * 0.001;
    // 아주 약한 흔들림: ±3px 좌우, 0~2px 수직
    const swingX = Math.sin(t * 2.5) * 3;
    const swingY = Math.abs(Math.sin(t * 2.5)) * 2;

    // 줄자 끝 → 박스 상단 연결 실
    const boxTopX = tipX + swingX;
    const boxTopY = tipY + swingY;
    ctx.save();
    ctx.strokeStyle = 'rgba(200,184,232,0.5)';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(boxTopX, boxTopY);
    ctx.stroke();
    ctx.restore();

    // 박스 중심 = 박스 상단에서 BOX_H/2 아래
    drawBox(boxTopX, boxTopY + BOX_H / 2);
  }
}

function drawRuler() {
  const x    = Math.floor(gs.rulerX);
  const topY = 20;
  const tipY = Math.floor(GH * 0.75);
  const h    = tipY - topY;

  // 자 이미지 (비율 유지, 높이를 ruler 영역에 맞춤)
  if (RULER_IMG.complete && RULER_IMG.naturalWidth) {
    const naturalW = RULER_IMG.naturalWidth * h / RULER_IMG.naturalHeight;
    const w = (RW * 2 + naturalW) / 2;   // 기존 폭(10px)과 원본 비율 폭의 중간
    ctx.drawImage(RULER_IMG, x - w / 2, topY, w, h);
  } else {
    ctx.fillStyle = '#f5c842';
    ctx.fillRect(x - RW, topY, RW * 2, h);
  }

  // 아이템 아이콘은 DONE 결과 화면에서만 공개 (drawResult 참조)
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, GW, 26);

  // 라벨·색상은 PHASE_CONFIG에서 읽음 → 새 페이즈 추가 시 여기 수정 불필요
  const { label, labelColor } = PHASE_CONFIG[gs.phase];

  ctx.font         = '7px "Press Start 2P", monospace';
  ctx.textBaseline = 'middle';
  ctx.textAlign    = 'left';
  ctx.fillStyle    = labelColor;
  ctx.fillText(label, 8, 13);

  // 깊이 퍼센트 (WORLD_H 기준)
  const pct = Math.min(Math.floor(gs.cameraY / WORLD_H * 100), 100);
  ctx.fillStyle = '#666';
  ctx.textAlign = 'right';
  ctx.fillText(`${pct}%`, GW - 8, 13);
  ctx.textBaseline = 'alphabetic';
}

function drawResult() {
  const bx = 28, bw = GW - 56, by = GH / 2 - 90, bh = 200;

  ctx.fillStyle   = 'rgba(26,14,46,0.93)';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#f5c842';
  ctx.lineWidth   = 2;
  ctx.strokeRect(bx, by, bw, bh);

  ctx.textAlign = 'center';

  if (gs.result === 'win' && gs.pickedItem) {
    ctx.fillStyle = '#f5c842';
    ctx.font      = '11px "Press Start 2P", monospace';
    ctx.fillText('탐험 성공!', GW / 2, by + 38);

    ctx.font         = '36px serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(gs.pickedItem.emoji, GW / 2, by + 90);
    ctx.textBaseline = 'alphabetic';

    ctx.fillStyle = '#c8b8e8';
    ctx.font      = '7px "Press Start 2P", monospace';
    ctx.fillText(gs.pickedItem.name, GW / 2, by + 130);

    const rarityColor = { common:'#888', rare:'#44aaff', epic:'#e05c2a' }[gs.pickedItem.rarity];
    ctx.fillStyle = rarityColor;
    ctx.fillText(`[ ${gs.pickedItem.rarity.toUpperCase()} ]`, GW / 2, by + 150);

  } else {
    ctx.fillStyle = '#e05c2a';
    ctx.font      = '11px "Press Start 2P", monospace';
    ctx.fillText('빈손 귀환', GW / 2, by + 80);
  }

  // 터치 안내 (블링크)
  const blink = Math.floor(Date.now() / 500) % 2;
  ctx.fillStyle = blink ? '#3dba4e' : 'rgba(61,186,78,0.35)';
  ctx.font      = '7px "Press Start 2P", monospace';
  ctx.fillText('터치하여 계속', GW / 2, by + bh - 14);
}


// ═══════════════════════════════════════════
//  입력 처리 (터치 / 마우스)
// ═══════════════════════════════════════════
(function setupInput() {
  let dragging = false;

  function getX(e) {
    const r     = gameCanvas.getBoundingClientRect();
    const scale = GW / r.width;
    const cx    = e.touches ? e.touches[0].clientX : e.clientX;
    return (cx - r.left) * scale;
  }

  function moveRuler(e) {
    if (gs.phase !== PHASE.DESCEND && gs.phase !== PHASE.ASCEND) return;
    const x   = getX(e);
    gs.rulerX = Math.max(RW + 10, Math.min(GW - RW - 10, x));
  }

  gameCanvas.addEventListener('pointerdown', e => { dragging = true; moveRuler(e); });
  gameCanvas.addEventListener('pointermove', e => { if (dragging) moveRuler(e); });
  gameCanvas.addEventListener('pointerup',   ()  => { dragging = false; });
  gameCanvas.addEventListener('touchmove',   e => { e.preventDefault(); moveRuler(e); }, { passive: false });
})();


// ═══════════════════════════════════════════
//  메인 화면 — 별 애니메이션
// ═══════════════════════════════════════════
const starCanvas = document.getElementById('star-canvas');
const sctx       = starCanvas.getContext('2d');
starCanvas.width  = 360;
starCanvas.height = 680;

const STARS = Array.from({ length: 60 }, () => ({
  x:     Math.random() * 360,
  y:     Math.random() * 680,
  size:  Math.random() < 0.25 ? 2 : 1,
  t:     Math.random() * Math.PI * 2,
  speed: 0.015 + Math.random() * 0.02,
}));

function startStars() {
  if (starAnimId) cancelAnimationFrame(starAnimId);
  function tick() {
    sctx.clearRect(0, 0, 360, 680);
    for (const s of STARS) {
      s.t += s.speed;
      const a = (Math.sin(s.t) + 1) / 2;
      sctx.fillStyle = `rgba(245,200,66,${(a * 0.7 + 0.1).toFixed(2)})`;
      sctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
    }
    if (appState === STATE.MAIN) starAnimId = requestAnimationFrame(tick);
  }
  tick();
}


// ═══════════════════════════════════════════
//  메인 화면 — 소파 픽셀아트

  // 다리

  // 팔걸이 (좌/우)
  p(10, 18, 22, 50, '#7d4628');
  p(168, 18, 22, 50, '#7d4628');

  // 등받이
  p(10, 18, 180, 20, '#7d4628');

  // 쿠션 2개
  p(36, 70, 64, 32, '#8a5030');
  p(106, 70, 64, 32, '#8a5030');

  // 쿠션 하이라이트

  p(108, 72, 28, 3, '#9a6040');

  // 소파 밑 어둠 + ? 힌트
  p(10, 108, 180, 12, '#0e0818');
  s.fillStyle = '#3a2060';
  s.font      = 'bold 9px "Press Start 2P", monospace';
  s.textAlign = 'center';
  s.fillText('?', 100, 119);

  // 그림자
  p(6, 120, 188, 3, '#000');
}


// ═══════════════════════════════════════════
//  도감 화면
// ═══════════════════════════════════════════
function renderCollection() {
  const grid = document.getElementById('col-grid');
  grid.innerHTML = '';
  for (const item of ITEMS) {
    const unlocked = save.collected.includes(item.id);
    const div      = document.createElement('div');
    div.className  = `c-item${unlocked ? '' : ' locked'}`;
    div.innerHTML  = `
      <span>${item.emoji}</span>
      <span class="c-rarity r-${item.rarity}"></span>
    `;
    div.title = unlocked ? item.name : '???';
    grid.appendChild(div);
  }
}


// ═══════════════════════════════════════════
//  기록 화면
// ═══════════════════════════════════════════
function renderRecords() {
  document.getElementById('stat-plays').textContent = save.totalPlays;
  document.getElementById('stat-wins').textContent  = save.wins;

  const list = document.getElementById('rec-list');
  list.innerHTML = '';

  if (!save.records.length) {
    list.innerHTML = '<div style="font-size:8px;color:#555;text-align:center;padding:24px">아직 기록 없음</div>';
    return;
  }

  for (const r of save.records) {
    const item = ITEMS.find(i => i.id === r.itemId);
    const div  = document.createElement('div');
    div.className = `record-row${item ? '' : ' fail'}`;
    div.innerHTML = item
      ? `<span>${item.emoji} ${item.name}</span><span class="record-date">${r.date}</span>`
      : `<span style="color:#e05c2a">빈손 귀환</span><span class="record-date">${r.date}</span>`;
    list.appendChild(div);
  }
}

}());
